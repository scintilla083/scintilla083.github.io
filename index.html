<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="script.js"></script>
    <title>Scintilla083 Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-bar">
        <img src="" alt="Logo" id="github-logo" class="logo">
        <span class="nickname" id="github-nickname">scintilla083</span>
    </div>

    <div class="container">
        <h1>My Achievements</h1>
        <div class="btn-container">
            <button class="btn" onclick="showCertificates()">Certificates</button>
            <button class="btn" onclick="showGitHub()">GitHub Repos</button>
            <button class="btn" onclick="showHTB()">HTB Rooms</button>
        </div>

        <div class="feed" id="feed">
            <div id="content">
                <p>Welcome! Click the buttons to see my achievements.</p>
            </div>
        </div>
    </div>

    <div class="bottom-bar">
        <a href="https://github.com/yourusername" target="_blank">
            <img src="static/icons/github.svg" alt="GitHub">
        </a>
        <a href="https://www.linkedin.com/in/yourusername" target="_blank">
            <img src="static/icons/telegram.svg" alt="LinkedIn">
        </a>
        <a href="https://twitter.com/yourusername" target="_blank">
            <img src="static/icons/HTB.svg" alt="HTB">
        </a>
        <a href="https://twitter.com/yourusername" target="_blank">
            <img src="static/icons/thm.svg" alt="THM">
        </a>
    </div>
</body>
</html>
